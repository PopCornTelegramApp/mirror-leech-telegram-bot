name: Deploy to HuggingFace Space

  on:
    push:
      branches: [master]
    workflow_dispatch:

  jobs:
    deploy:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0
            lfs: true

        - name: Deploy to HuggingFace Space
          env:
            HF_TOKEN: ${{ secrets.HF_TOKEN }}
          run: |
            pip install huggingface_hub
            python3 - <<'PYEOF'
  import os
  from huggingface_hub import HfApi

  token = os.environ["HF_TOKEN"]
  api = HfApi(token=token)
  api.upload_folder(
      folder_path=".",
      repo_id="ToolKit-backend/popcorn-mirror-bot",
      repo_type="space",
      ignore_patterns=[".git/*", ".github/*", "*.pyc", "__pycache__/*"],
      commit_message="🍿 Auto-deploy from GitHub Actions",
  )
  print("Deployment complete!")
  PYEOF
  